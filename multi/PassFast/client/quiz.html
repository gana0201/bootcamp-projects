<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassFast - 학습 스페이스</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { pf: { light:'#04D8FF', dark:'#3004FF', sub:'#212225', point:'#F7220C' } } } }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .choice-btn { transition: all 0.15s ease; }
    .choice-btn:hover:not(.selected):not(.disabled) { border-color: #3004FF; background: rgba(48,4,255,0.05); }
    .choice-btn.selected { border-color: #3004FF; background: rgba(48,4,255,0.1); }
    .choice-btn.correct { border-color: #04D8FF; background: rgba(4,216,255,0.1); }
    .choice-btn.wrong { border-color: #F7220C; background: rgba(247,34,12,0.1); }
    .choice-btn.disabled { pointer-events: none; opacity: 0.7; }
  </style>
</head>
<body class="bg-pf-sub text-slate-100 min-h-screen">

  <header class="sticky top-0 z-50 bg-pf-sub/80 backdrop-blur-xl border-b border-slate-700/50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <svg viewBox="0 0 36 36" fill="none" class="w-8 h-8">
          <rect width="36" height="36" rx="10" fill="url(#logo-grad-q)"/>
          <path d="M20 8L12 20h6l-2 8 8-12h-6l2-8z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
          <path d="M14 24l2 2 4-5" stroke="#04D8FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <defs><linearGradient id="logo-grad-q" x1="0" y1="0" x2="36" y2="36"><stop offset="0%" stop-color="#3004FF"/><stop offset="100%" stop-color="#04D8FF"/></linearGradient></defs>
        </svg>
        <span class="text-lg font-black tracking-tight"><span class="text-white">Pass</span><span class="bg-gradient-to-r from-pf-light to-pf-dark bg-clip-text text-transparent">Fast</span></span>
      </a>
      <nav id="main-nav" class="flex items-center gap-2"></nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8">

    <!-- 시작 화면 -->
    <div id="quiz-start" class="space-y-6">
      <div class="text-center py-8">
        <h1 class="text-2xl font-bold text-white mb-2">학습 스페이스</h1>
        <p class="text-sm text-slate-400">자격증을 선택하고 학습을 시작하세요</p>
      </div>
      <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-6">
        <h2 class="text-sm font-semibold text-slate-300 mb-4 flex items-center gap-2">
          <i data-lucide="list" class="w-4 h-4 text-pf-light"></i> 시험 종목 선택
        </h2>
        <div id="quiz-cert-select" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
      </div>
      <button id="start-quiz-btn" disabled class="w-full flex items-center justify-center gap-2 px-6 py-4 bg-pf-dark hover:bg-pf-dark/80 disabled:bg-slate-700 disabled:text-slate-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-pf-dark/20 disabled:shadow-none">
        <i data-lucide="play" class="w-5 h-5"></i> 학습 시작
      </button>
    </div>

    <!-- 문제 풀이 화면 -->
    <div id="quiz-area" class="hidden space-y-6">
      <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-4">
        <div class="flex items-center justify-between mb-3">
          <span id="quiz-cert-label" class="text-sm font-medium text-white"></span>
          <span id="quiz-progress-text" class="text-xs text-slate-400"></span>
        </div>
        <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
          <div id="quiz-progress-bar" class="h-full bg-gradient-to-r from-pf-dark to-pf-light rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
      </div>
      <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-6">
        <div class="flex items-start gap-3 mb-6">
          <span id="question-number" class="flex-shrink-0 w-8 h-8 bg-pf-dark/20 text-pf-light rounded-lg flex items-center justify-center text-sm font-bold">1</span>
          <p id="question-text" class="text-base font-medium text-white leading-relaxed"></p>
        </div>
        <div id="choices-container" class="space-y-3"></div>
        <div id="explanation-area" class="hidden mt-6 p-4 bg-slate-700/30 border border-slate-600/30 rounded-xl">
          <p class="text-xs font-medium text-pf-light mb-1">해설</p>
          <p id="explanation-text" class="text-sm text-slate-300 leading-relaxed"></p>
        </div>
      </div>
      <button id="next-btn" class="hidden w-full flex items-center justify-center gap-2 px-6 py-3 bg-pf-dark hover:bg-pf-dark/80 text-white font-medium rounded-xl transition-all">
        <span id="next-btn-text">다음 문제</span>
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- 결과 화면 -->
    <div id="quiz-result" class="hidden space-y-6">
      <div class="text-center py-8">
        <div id="result-icon" class="w-20 h-20 mx-auto mb-4 rounded-full flex items-center justify-center"></div>
        <h1 id="result-title" class="text-2xl font-bold text-white mb-2"></h1>
        <p id="result-subtitle" class="text-sm text-slate-400"></p>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-slate-800/60 border border-slate-700/50 rounded-xl p-4 text-center">
          <p class="text-xs text-slate-400 mb-1">정답</p>
          <p id="result-correct" class="text-2xl font-bold text-pf-light"></p>
        </div>
        <div class="bg-slate-800/60 border border-slate-700/50 rounded-xl p-4 text-center">
          <p class="text-xs text-slate-400 mb-1">오답</p>
          <p id="result-wrong" class="text-2xl font-bold text-pf-point"></p>
        </div>
        <div class="bg-slate-800/60 border border-slate-700/50 rounded-xl p-4 text-center">
          <p class="text-xs text-slate-400 mb-1">점수</p>
          <p id="result-score" class="text-2xl font-bold text-pf-light"></p>
        </div>
      </div>
      <div class="flex gap-3">
        <a href="review.html" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-slate-700/60 hover:bg-slate-700 text-slate-200 font-medium rounded-xl transition border border-slate-600/50">
          <i data-lucide="file-text" class="w-4 h-4"></i> 오답 분석 보기
        </a>
        <button onclick="resetQuiz()" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-pf-dark hover:bg-pf-dark/80 text-white font-medium rounded-xl transition-all">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 다시 풀기
        </button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    let CATALOG=[], quizCertId=null, questions=[], currentIndex=0, userAnswers=[], answered=false;

    document.addEventListener('DOMContentLoaded', async () => {
      renderNav('quiz.html');
      try { CATALOG = await PassFast.getCatalog(); } catch(e) { CATALOG=[]; }

      // 보관함에 있는 시험 과목들을 표시
      let vaultCerts = [];
      try {
        const vault = await PassFast.getVault();
        vaultCerts = vault.map(v => CATALOG.find(c => c.id === v.cert_id)).filter(Boolean);
      } catch(e) {}

      if (vaultCerts.length > 0) {
        renderCertSelect(vaultCerts);
        // activeCert가 보관함에 있으면 자동 선택
        const active = PassFast.getActiveCert();
        if (active) {
          const certId = active.certId || active.cert_id;
          if (vaultCerts.find(c => c.id === certId)) selectQuizCert(certId);
        }
      } else {
        renderCertSelect([]);
      }
    });

    function renderCertSelect(certs) {
      const container = document.getElementById('quiz-cert-select');
      if (!certs.length) { container.innerHTML='<p class="text-sm text-slate-400 col-span-2 text-center py-4">대시보드에서 시험을 먼저 등록해주세요.</p>'; return; }
      container.innerHTML = certs.map(cert =>
        '<div class="quiz-cert-card cursor-pointer bg-slate-700/40 border border-slate-600/40 rounded-xl p-4 transition-all hover:border-pf-light/50" data-cert-id="'+cert.id+'" onclick="selectQuizCert(\''+cert.id+'\')">' +
        '<div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-slate-600/50 flex items-center justify-center"><i data-lucide="'+(cert.icon||'monitor')+'" class="w-5 h-5 text-pf-light"></i></div>' +
        '<div><h3 class="text-sm font-semibold text-white">'+cert.name+'</h3><p class="text-xs text-slate-400">'+cert.category+'</p></div></div></div>'
      ).join('');
      lucide.createIcons();
    }

    function selectQuizCert(certId) {
      quizCertId = certId;
      document.querySelectorAll('.quiz-cert-card').forEach(card => {
        if(card.dataset.certId===certId){card.classList.add('border-pf-light','bg-pf-light/10','ring-2','ring-pf-light');card.classList.remove('border-slate-600/40');}
        else{card.classList.remove('border-pf-light','bg-pf-light/10','ring-2','ring-pf-light');card.classList.add('border-slate-600/40');}
      });
      document.getElementById('start-quiz-btn').disabled = false;
    }

    document.getElementById('start-quiz-btn').addEventListener('click', async () => {
      if (!quizCertId) return;
      const cert = CATALOG.find(c=>c.id===quizCertId);
      const certName = cert ? cert.name : '';
      const certDesc = cert ? cert.description : '';

      // 버튼 로딩 상태
      const btn = document.getElementById('start-quiz-btn');
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> AI가 문제를 생성 중...';
      lucide.createIcons();

      // 취약 과목 분석
      let weakSubjects = [];
      try {
        const history = await PassFast.getQuizHistory();
        const myResults = history.filter(h => (h.cert_id || h.certId) === quizCertId);
        if (myResults.length > 0) {
          const ws = {};
          myResults.forEach(r => { if(r.answers) r.answers.forEach(a => { if(!a.correct && a.subject_name) ws[a.subject_name]=(ws[a.subject_name]||0)+1; }); });
          weakSubjects = Object.entries(ws).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
        }
      } catch(e) {}

      // AI 문제 생성 시도
      try {
        const aiQuestions = await PassFast.generateQuestions(certName, certDesc, 5, weakSubjects);
        if (aiQuestions && aiQuestions.length > 0) {
          questions = aiQuestions;
        } else {
          throw new Error("AI 생성 실패");
        }
      } catch(e) {
        // 폴백: DB에서 문제 로드
        console.warn("AI 문제 생성 실패, DB 문제로 대체:", e.message);
        try {
          questions = await PassFast.getQuestions(quizCertId);
          if (!questions.length) { alert('문제를 불러올 수 없습니다.'); btn.disabled=false; btn.innerHTML='<i data-lucide="play" class="w-5 h-5"></i> 학습 시작'; lucide.createIcons(); return; }
        } catch(e2) { alert('문제를 불러올 수 없습니다.'); btn.disabled=false; btn.innerHTML='<i data-lucide="play" class="w-5 h-5"></i> 학습 시작'; lucide.createIcons(); return; }
      }

      // 문제 셔플
      questions = shuffleArray(questions);
      currentIndex=0; userAnswers=[]; answered=false;

      document.getElementById('quiz-cert-label').textContent = certName;
      document.getElementById('quiz-start').classList.add('hidden');
      document.getElementById('quiz-area').classList.remove('hidden');
      btn.disabled=false; btn.innerHTML='<i data-lucide="play" class="w-5 h-5"></i> 학습 시작';
      renderQuestion();
    });

    function shuffleArray(arr) { const s=[...arr]; for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];} return s; }

    function renderQuestion() {
      answered=false;
      const q=questions[currentIndex], total=questions.length;
      document.getElementById('question-number').textContent=currentIndex+1;
      document.getElementById('question-text').textContent=q.question;
      document.getElementById('quiz-progress-text').textContent=(currentIndex+1)+' / '+total;
      document.getElementById('quiz-progress-bar').style.width=((currentIndex+1)/total*100)+'%';
      const container=document.getElementById('choices-container');
      container.innerHTML=q.choices.map((choice,i)=>
        '<button class="choice-btn w-full text-left px-4 py-3 bg-slate-700/30 border border-slate-600/40 rounded-xl flex items-center gap-3" data-index="'+i+'" onclick="selectAnswer('+i+')">'+
        '<span class="flex-shrink-0 w-7 h-7 rounded-lg bg-slate-600/50 flex items-center justify-center text-xs font-bold text-slate-300">'+String.fromCharCode(65+i)+'</span>'+
        '<span class="text-sm text-slate-200">'+choice+'</span></button>'
      ).join('');
      document.getElementById('explanation-area').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('next-btn-text').textContent = currentIndex===total-1?'결과 확인':'다음 문제';
      lucide.createIcons();
    }

    function selectAnswer(idx) {
      if(answered) return; answered=true;
      const q=questions[currentIndex], isCorrect=idx===q.answer;
      userAnswers.push({questionId:q.id,question:q.question,choices:q.choices,selectedAnswer:idx,correctAnswer:q.answer,correct:isCorrect,explanation:q.explanation,subject_name:q.subject_name||""});
      document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
        btn.classList.add('disabled');
        if(i===q.answer) btn.classList.add('correct');
        else if(i===idx&&!isCorrect) btn.classList.add('wrong');
        if(i===idx) btn.classList.add('selected');
      });
      document.getElementById('explanation-text').textContent=q.explanation;
      document.getElementById('explanation-area').classList.remove('hidden');
      document.getElementById('next-btn').classList.remove('hidden');
    }

    document.getElementById('next-btn').addEventListener('click',()=>{
      currentIndex++;
      if(currentIndex>=questions.length) showResult();
      else renderQuestion();
    });

    async function showResult() {
      const correct=userAnswers.filter(a=>a.correct).length, wrong=userAnswers.filter(a=>!a.correct).length, total=userAnswers.length, scorePercent=Math.round(correct/total*100);
      const cert=CATALOG.find(c=>c.id===quizCertId), passingScore=cert?(cert.passing_score||60):60, passed=scorePercent>=passingScore;
      await PassFast.saveQuizResult({certId:quizCertId,certName:cert?cert.name:'',totalQuestions:total,correctCount:correct,wrongCount:wrong,scorePercent,passed,answers:userAnswers});
      document.getElementById('quiz-area').classList.add('hidden');
      document.getElementById('quiz-result').classList.remove('hidden');
      document.getElementById('result-icon').innerHTML=passed?'<div class="w-20 h-20 bg-pf-light/20 border-2 border-pf-light/50 rounded-full flex items-center justify-center"><i data-lucide="check-circle" class="w-10 h-10 text-pf-light"></i></div>':'<div class="w-20 h-20 bg-pf-point/20 border-2 border-pf-point/50 rounded-full flex items-center justify-center"><i data-lucide="x-circle" class="w-10 h-10 text-pf-point"></i></div>';
      document.getElementById('result-title').textContent=passed?'합격 기준 충족!':'불합격 기준';
      document.getElementById('result-subtitle').textContent=passed?'합격 커트라인 '+passingScore+'점을 넘었습니다.':'커트라인 '+passingScore+'점에 미달했습니다.';
      document.getElementById('result-correct').textContent=correct;
      document.getElementById('result-wrong').textContent=wrong;
      document.getElementById('result-score').textContent=scorePercent+'점';
      lucide.createIcons();
    }

    async function resetQuiz() {
      document.getElementById('quiz-result').classList.add('hidden');
      document.getElementById('quiz-start').classList.remove('hidden');
      quizCertId=null;questions=[];currentIndex=0;userAnswers=[];

      let vaultCerts = [];
      try {
        const vault = await PassFast.getVault();
        vaultCerts = vault.map(v => CATALOG.find(c => c.id === v.cert_id)).filter(Boolean);
      } catch(e) {}

      if (vaultCerts.length > 0) {
        renderCertSelect(vaultCerts);
        const active = PassFast.getActiveCert();
        if (active) {
          const certId = active.certId || active.cert_id;
          if (vaultCerts.find(c => c.id === certId)) selectQuizCert(certId);
        }
      } else {
        renderCertSelect([]);
      }
    }
  </script>
</body>
</html>
